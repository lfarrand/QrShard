name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            asset: qrshard-win-x64.zip
          - os: ubuntu-latest
            rid: linux-x64
            asset: qrshard-linux-x64.tar.gz
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            asset: qrshard-linux-arm64.tar.gz
          - os: macos-latest
            rid: osx-arm64
            asset: qrshard-osx-arm64.tar.gz
    runs-on: ${{ matrix.os }}
    env:
      SixLaborsLicenseKey: ${{ secrets.SIXLABORS_LICENSE_KEY }}
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Test
        run: dotnet test tests/QrShard.Tests/QrShard.Tests.csproj -c Release

      # Native AOT: single self-contained binary, ~20ms startup. The runners carry the
      # platform C++ toolchains; the trimmed IL analysis is warning-clean.
      - name: Publish (Native AOT)
        run: dotnet publish src/QrShard/QrShard.csproj -c Release -r ${{ matrix.rid }} -p:PublishAot=true -p:PackAsTool=false

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path src/QrShard/bin/Release/net10.0/${{ matrix.rid }}/publish/* -DestinationPath ${{ matrix.asset }}

      - name: Archive (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.asset }} -C src/QrShard/bin/Release/net10.0/${{ matrix.rid }}/publish .

      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${{ github.ref_name }}" "${{ matrix.asset }}" --clobber || gh release create "${{ github.ref_name }}" "${{ matrix.asset }}" --generate-notes

  # Publishes via nuget.org trusted publishing: GitHub mints an OIDC token for this job,
  # nuget.org validates it against a policy naming this repo and workflow file, and hands back
  # a short-lived key. No long-lived API key is stored anywhere.
  #
  # Requires, one time: a policy at https://www.nuget.org/account/trustedpublishing with
  # Repository Owner=lfarrand, Repository=QrShard, Workflow File=release.yml (filename only,
  # no path), Environment blank; plus a NUGET_USER secret holding the nuget.org profile name
  # (not an email). Without NUGET_USER the job still packs and simply skips publishing.
  nuget:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # mint the OIDC token; NuGet/login returns 403 without it
      contents: read    # job-level permissions replace the workflow-level default wholesale
      packages: write   # mirror the same packages to GitHub Packages
    env:
      SixLaborsLicenseKey: ${{ secrets.SIXLABORS_LICENSE_KEY }}
      NUGET_USER: ${{ secrets.NUGET_USER }}
      DOTNET_NOLOGO: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Pack tool and library
        run: |
          dotnet pack src/QrShard/QrShard.csproj -c Release -o nupkg -p:Version=${GITHUB_REF_NAME#v}
          dotnet pack src/QrShard.Core/QrShard.Core.csproj -c Release -o nupkg -p:Version=${GITHUB_REF_NAME#v}

      # Deliberately the last step before the push: the issued key lasts one hour and is
      # single-use, so requesting it any earlier only risks it expiring.
      - name: NuGet login (OIDC)
        if: env.NUGET_USER != ''
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        if: env.NUGET_USER != ''
        run: dotnet nuget push "nupkg/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      # Secondary mirror, so the packages show under the repository's Packages section. Not a
      # public distribution channel: GitHub Packages requires a token with read:packages to
      # install from, even for public repos, so nuget.org above remains the supported source.
      # Uses the run's own GITHUB_TOKEN — no secret to configure.
      - name: Mirror to GitHub Packages
        run: dotnet nuget push "nupkg/*.nupkg" --api-key "${{ secrets.GITHUB_TOKEN }}" --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate
