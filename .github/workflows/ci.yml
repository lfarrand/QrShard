name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        # Every platform the release matrix publishes a binary for must also run the suite here,
        # so a platform-specific failure is caught on the PR, not at release time. (linux-arm64
        # was release-only until an arm64-timing test failure blocked its v1.3.0 binary.)
        os: [windows-latest, ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      # ImageSharp 4.x validates a license at build time. Add your Six Labors license key
      # (the contents of sixlabors.lic) as the SIXLABORS_LICENSE_KEY repository secret.
      # Free community licenses: https://sixlabors.com/pricing/
      SixLaborsLicenseKey: ${{ secrets.SIXLABORS_LICENSE_KEY }}
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build -c Release

      - name: Test
        run: dotnet test tests/QrShard.Tests/QrShard.Tests.csproj -c Release --no-build --logger "console;verbosity=minimal"

      - name: Round-trip self-test
        run: dotnet run --project src/QrShard -c Release --no-build -- test
